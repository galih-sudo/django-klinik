{% extends "rekam_medis/base.html" %}
{% block title %}Edit Pasien - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
    <div class="card-header"><h3>✏️ Edit Pasien: {{ pasien.nama }}</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nama:</label>
            <input type="text" name="nama" class="form-control" value="{{ pasien.nama }}" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir:</label>
            <input type="date" name="tgl_lahir" class="form-control" value="{{ pasien.tgl_lahir|date:'Y-m-d' }}">
        </div>
        <div class="form-group">
            <label>Alamat:</label>
            <textarea name="alamat" class="form-control" rows="2">{{ pasien.alamat }}</textarea>
        </div>
        <div class="form-group">
            <label>No Telp:</label>
            <input type="text" name="no_telp" class="form-control" value="{{ pasien.no_telp }}">
        </div>
        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <select name="jenis_kelamin" class="form-control">
                <option value="L" {% if pasien.jenis_kelamin == 'L' %}selected{% endif %}>Laki-laki</option>
                <option value="P" {% if pasien.jenis_kelamin == 'P' %}selected{% endif %}>Perempuan</option>
            </select>
        </div>
        <div class="form-group">
            <label>Pekerjaan:</label>
            <input type="text" name="pekerjaan" class="form-control" value="{{ pasien.pekerjaan }}">
        </div>
        <div class="form-group">
            <label>Alergi:</label>
            <textarea name="alergi" class="form-control" rows="2">{{ pasien.alergi }}</textarea>
        </div>
        <div class="form-group">
            <label>Riwayat Penyakit:</label>
            <textarea name="riwayat_penyakit" class="form-control" rows="2">{{ pasien.riwayat_penyakit }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">💾 Update</button>
        <a href="{% url 'daftar_pasien' %}" class="btn btn-secondary">🔙 Batal</a>
    </form>
</div>
{% endblock %}
