<!DOCTYPE html>
<html>
<head>
    <title>Tambah ICD-10 - dr Galih</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h2 { color: #667eea; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #764ba2; margin-bottom: 20px; font-size: 14px; }
        label { display: block; font-weight: bold; margin-top: 12px; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; }
        button { width: 100%; padding: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 15px; font-size: 16px; font-weight: bold; }
        .btn-back { display: block; text-align: center; margin-top: 15px; padding: 8px; background: #6c757d; color: white; text-decoration: none; border-radius: 8px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>➕ Tambah ICD-10</h2>
        <div class="subtitle">Masukkan kode dan nama penyakit</div>

        <form method="POST">
            {% csrf_token %}
            <label>Kode</label>
            <input type="text" name="kode" placeholder="Contoh: A09" required>

            <label>Nama Penyakit</label>
            <input type="text" name="nama_penyakit" placeholder="Contoh: Diare gastroenteritis" required>

            <label>Kategori</label>
            <input type="text" name="kategori" placeholder="Contoh: Pencernaan">

            <button type="submit">💾 Simpan ICD-10</button>
        </form>
        <a href="/icd10/" class="btn-back">← Kembali ke Daftar ICD-10</a>
    </div>
</div>
</body>
</html>
