{% extends "rekam_medis/base.html" %}
{% block title %}Tambah ICD-10 - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header"><h3>➕ Tambah ICD-10</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Kode</label>
            <input type="text" name="kode" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Nama Penyakit</label>
            <input type="text" name="nama_penyakit" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Kategori</label>
            <input type="text" name="kategori" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">💾 Simpan</button>
        <a href="{% url 'kelola_icd10' %}" class="btn btn-secondary">🔙 Kembali</a>
    </form>
</div>
{% endblock %}
