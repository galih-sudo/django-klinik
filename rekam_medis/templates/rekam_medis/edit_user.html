<!DOCTYPE html>
<html>
<head>
    <title>Edit User - dr Galih</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h2 { color: #667eea; margin-bottom: 20px; text-align: center; }
        label { display: block; margin: 10px 0 5px; font-weight: 600; color: #333; }
        input, select { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        input:focus, select:focus { border-color: #667eea; outline: none; }
        .btn { padding: 10px 25px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #667eea; color: white; width: 100%; margin-top: 15px; }
        .btn-secondary { background: #6c757d; color: white; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .readonly { background: #f0f0f0; color: #666; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>✏️ Edit User: {{ user.username }}</h2>
        
        <form method="POST">
            {% csrf_token %}
            <label>Username (Tidak bisa diubah)</label>
            <input type="text" value="{{ user.username }}" class="readonly" disabled>
            
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email|default:'' }}">
            
            <label>Role</label>
            <select name="role">
                <option value="staf" {% if profile.role == 'staf' %}selected{% endif %}>📋 Staf</option>
                <option value="dokter" {% if profile.role == 'dokter' %}selected{% endif %}>👨‍⚕️ Dokter</option>
            </select>
            
            <button type="submit" class="btn btn-primary">💾 Update</button>
        </form>
        
        <div class="actions">
            <a href="{% url 'kelola_user' %}" class="btn btn-secondary">🔙 Kembali</a>
        </div>
    </div>
</div>
</body>
</html>
