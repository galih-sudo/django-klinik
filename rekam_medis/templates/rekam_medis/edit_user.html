{% extends "rekam_medis/base.html" %}
{% block title %}Edit User - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header"><h3>✏️ Edit User: {{ user.username }}</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Username (tidak bisa diubah)</label>
            <input type="text" value="{{ user.username }}" class="form-control" disabled>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" value="{{ user.email|default:'' }}">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role" class="form-control">
                <option value="dokter" {% if profile.role == 'dokter' %}selected{% endif %}>Dokter</option>
                <option value="staf" {% if profile.role == 'staf' %}selected{% endif %}>Staf</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">💾 Update</button>
        <a href="{% url 'kelola_user' %}" class="btn btn-secondary">🔙 Kembali</a>
    </form>
</div>
{% endblock %}
