{% extends "rekam_medis/base.html" %}
{% block title %}Tambah Pasien - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
    <div class="card-header"><h3>➕ Tambah Pasien</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nama:</label>
            <input type="text" name="nama" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Tanggal Lahir:</label>
            <input type="date" name="tgl_lahir" class="form-control">
        </div>
        <div class="form-group">
            <label>Alamat:</label>
            <textarea name="alamat" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>No Telp:</label>
            <input type="text" name="no_telp" class="form-control">
        </div>
        <div class="form-group">
            <label>Jenis Kelamin:</label>
            <select name="jenis_kelamin" class="form-control">
                <option value="L">Laki-laki</option>
                <option value="P">Perempuan</option>
            </select>
        </div>
        <div class="form-group">
            <label>Pekerjaan:</label>
            <input type="text" name="pekerjaan" class="form-control">
        </div>
        <div class="form-group">
            <label>Alergi:</label>
            <textarea name="alergi" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>Riwayat Penyakit:</label>
            <textarea name="riwayat_penyakit" class="form-control" rows="2"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">💾 Simpan</button>
        <a href="{% url 'daftar_pasien' %}" class="btn btn-secondary">🔙 Batal</a>
    </form>
</div>
{% endblock %}
