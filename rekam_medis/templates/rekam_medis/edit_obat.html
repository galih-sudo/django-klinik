{% extends "rekam_medis/base.html" %}
{% block title %}Edit Obat - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header"><h3>✏️ Edit Obat: {{ obat.nama }}</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nama Obat</label>
            <input type="text" name="nama" class="form-control" value="{{ obat.nama }}" required>
        </div>
        <div class="form-group">
            <label>Stok</label>
            <input type="number" name="stok" class="form-control" value="{{ obat.stok }}">
        </div>
        <div class="form-group">
            <label>Satuan</label>
            <input type="text" name="satuan" class="form-control" value="{{ obat.satuan }}">
        </div>
        <button type="submit" class="btn btn-primary">💾 Update</button>
        <a href="{% url 'kelola_obat' %}" class="btn btn-secondary">🔙 Kembali</a>
    </form>
</div>
{% endblock %}
