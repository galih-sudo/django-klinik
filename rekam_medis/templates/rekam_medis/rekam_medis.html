{% extends "rekam_medis/base.html" %}
{% block title %}Rekam Medis - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 900px; margin: 0 auto;">
    <div class="card-header"><h3>📝 Rekam Medis: {{ pasien.nama }} ({{ pasien.no_rm }})</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Subjective (Keluhan):</label>
            <textarea name="subjective" class="form-control" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label>Objective (Hasil Pemeriksaan):</label>
            <textarea name="objective" class="form-control" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Assessment (Diagnosis):</label>
            <input type="text" name="assessment" class="form-control" placeholder="Misal: J10.1">
        </div>
        <div class="form-group">
            <label>Planning (Rencana Tindakan):</label>
            <textarea name="planning" class="form-control" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>ICD-10:</label>
            <select name="icd10" class="form-control">
                <option value="">-- Pilih ICD-10 --</option>
                {% for icd in icd_list %}
                <option value="{{ icd.kode }}">{{ icd.kode }} - {{ icd.nama_penyakit }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">💾 Simpan Rekam Medis</button>
        <a href="{% url 'daftar_pasien' %}" class="btn btn-secondary">🔙 Kembali</a>
    </form>
</div>
{% endblock %}
