{% extends "rekam_medis/base.html" %}
{% block title %}Edit ICD-10 - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header"><h3>✏️ Edit ICD-10: {{ icd.kode }}</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Kode (tidak bisa diubah)</label>
            <input type="text" value="{{ icd.kode }}" class="form-control" disabled>
        </div>
        <div class="form-group">
            <label>Nama Penyakit</label>
            <input type="text" name="nama_penyakit" class="form-control" value="{{ icd.nama_penyakit }}" required>
        </div>
        <div class="form-group">
            <label>Kategori</label>
            <input type="text" name="kategori" class="form-control" value="{{ icd.kategori|default:'' }}">
        </div>
        <button type="submit" class="btn btn-primary">💾 Update</button>
        <a href="{% url 'kelola_icd10' %}" class="btn btn-secondary">🔙 Kembali</a>
    </form>
</div>
{% endblock %}
