{% extends "rekam_medis/base.html" %}
{% block title %}Tambah User - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header"><h3>➕ Tambah User</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control">
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role" class="form-control">
                <option value="dokter">Dokter</option>
                <option value="staf" selected>Staf</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">💾 Simpan</button>
        <a href="{% url 'kelola_user' %}" class="btn btn-secondary">🔙 Kembali</a>
    </form>
</div>
{% endblock %}
