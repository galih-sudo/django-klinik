{% extends "rekam_medis/base.html" %}
{% block title %}Tambah Obat - dr Galih{% endblock %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header"><h3>➕ Tambah Obat</h3></div>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Nama Obat</label>
            <input type="text" name="nama" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Stok</label>
            <input type="number" name="stok" class="form-control" value="0">
        </div>
        <div class="form-group">
            <label>Satuan</label>
            <input type="text" name="satuan" class="form-control" value="tablet">
        </div>
        <button type="submit" class="btn btn-primary">💾 Simpan</button>
        <a href="{% url 'kelola_obat' %}" class="btn btn-secondary">🔙 Kembali</a>
    </form>
</div>
{% endblock %}
