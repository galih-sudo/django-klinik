{% extends "rekam_medis/base.html" %}
{% block title %}Kelola Obat - dr Galih{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3>💊 Daftar Obat</h3>
        <a href="{% url 'tambah_obat' %}" class="btn btn-success btn-sm">➕ Tambah Obat</a>
    </div>
    <table>
        <thead><tr><th>Nama</th><th>Stok</th><th>Satuan</th><th>Aksi</th></tr></thead>
        <tbody>
        {% for o in obat_list %}
        <tr>
            <td>{{ o.nama }}</td>
            <td>{{ o.stok }}</td>
            <td>{{ o.satuan }}</td>
            <td>
                <a href="{% url 'edit_obat' o.id %}" class="btn btn-warning btn-sm">✏️</a>
                <a href="{% url 'hapus_obat' o.id %}" class="btn btn-danger btn-sm" onclick="return confirm('Yakin?')">🗑️</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4" style="text-align:center;">Belum ada obat</td></tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
