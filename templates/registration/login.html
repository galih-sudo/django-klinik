<!DOCTYPE html>
<html>
<head>
    <title>Login - Praktek dr Galih</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-card h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .login-card h2 {
            color: #764ba2;
            font-size: 16px;
            font-weight: normal;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
            color: #999;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error {
            background: #fee;
            color: #e74c3c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 3px solid #e74c3c;
            text-align: left;
        }
        .running-text {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            overflow: hidden;
            white-space: nowrap;
        }
        .running-text marquee {
            color: #667eea;
            font-size: 11px;
        }
        .footer {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>🏥 Praktek Mandiri</h1>
            <h2>dr. Galih</h2>
            
            {% if form.errors %}
            <div class="error">
                ⚠️ Username atau password salah. Silakan coba lagi.
            </div>
            {% endif %}
            
            <form method="POST" autocomplete="off">
                {% csrf_token %}
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" name="username" placeholder="Masukkan username" required autocomplete="off">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" id="password" placeholder="Masukkan password" required>
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                </div>
                
                <button type="submit">Login</button>
            </form>
            
            <div class="running-text">
                <marquee scrollamount="3" behavior="scroll" direction="left">
                    📍 Jl. Raya Sengkol Mantang, Lombok Tengah | Melayani dengan Sepenuh Hati | Senin - Sabtu: 08:00 - 20:00 WITA
                </marquee>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            var passwordInput = document.getElementById('password');
            var toggleIcon = event.target;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }
    </script>
</body>
</html>
