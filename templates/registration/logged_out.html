<!DOCTYPE html>
<html>
<head>
    <title>Logout - dr Galih</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        h2 { color: #667eea; }
        p { color: #666; margin: 20px 0; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .btn:hover { background: #5a6fd6; }
    </style>
</head>
<body>
<div class="container">
    <h2>👋 Logout Berhasil</h2>
    <p>Anda telah berhasil logout dari sistem.</p>
    <a href="{% url 'login' %}" class="btn">Login Lagi</a>
</div>
</body>
</html>
